version: "3.9"

services:
  graperank:
    build: .
    environment:
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      NEO4J_URL: neo4j://host.docker.internal:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
    extra_hosts:
      - "host.docker.internal:host-gateway"
